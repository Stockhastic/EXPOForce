<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Form Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 30px;
            color: #1a202c;
        }

        .form-field {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: 500;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .form-input.has-error {
            border-color: #f56565;
            background-color: #fff5f5;
        }

        .form-error {
            display: block;
            margin-top: 6px;
            color: #f56565;
            font-size: 13px;
            min-height: 20px;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 120px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px 24px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button[type="submit"]:hover:not(:disabled) {
            background: #3182ce;
        }

        button[type="submit"]:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }

        .form-status {
            display: block;
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            min-height: 20px;
        }

        .form-status--success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .form-status--error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Form</h1>

        <form id="contact-form" data-form-handler="./form-handler.php">
            <div class="form-field">
                <label for="name" class="form-label">Full Name</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    class="form-input"
                    required
                    autocomplete="name"
                >
                <span class="form-error" role="alert"></span>
            </div>

            <div class="form-field">
                <label for="email" class="form-label">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input"
                    required
                    autocomplete="email"
                >
                <span class="form-error" role="alert"></span>
            </div>

            <div class="form-field">
                <label for="phone" class="form-label">Phone Number (optional)</label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    class="form-input"
                    autocomplete="tel"
                >
                <span class="form-error" role="alert"></span>
            </div>

            <div class="form-field">
                <label for="message" class="form-label">Message</label>
                <textarea 
                    id="message" 
                    name="message" 
                    class="form-input"
                    required
                ></textarea>
                <span class="form-error" role="alert"></span>
            </div>

            <button type="submit" class="button button--primary">Send Message</button>
            <span class="form-status" role="alert"></span>
        </form>
    </div>

    <!-- Include validator script -->
    <script src="./form-validator.js"></script>
</body>
</html>

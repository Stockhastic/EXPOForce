<header class="header">
    <div class="header__inner">
        <a class="header__brand" href="/index.html" aria-label="EXPAFORCE главная" data-i18n="[aria-label]header-brand-aria">
            <img
                class="header__logo header__logo--default"
                src="/src/graphics/svg/logo.svg"
                alt="Логотип EXPAFORCE"
                data-i18n="[alt]header-logo-alt"
            >
            <img
                class="header__logo header__logo--light"
                src="/src/graphics/svg/logo-white.svg"
                alt=""
                aria-hidden="true"
            >
        </a>
        <nav class="header__nav" aria-label="Основная навигация" data-i18n="[aria-label]header-nav-aria">
            <ul class="header__nav-list">
                <li class="header__nav-item">
                    <a class="header__nav-link" href="/index.html#marketplaces" data-i18n="[text]header-nav-marketplaces">Площадки</a>
                </li>
                <li class="header__nav-item">
                    <a class="header__nav-link" href="/index.html#services" data-i18n="[text]header-nav-services-page">Услуги</a>
                </li>
                <li class="header__nav-item">
                    <a class="header__nav-link" href="/index.html#process" data-i18n="[text]header-nav-process">Запуск</a>
                </li>
                <li class="header__nav-item">
                    <a class="header__nav-link" href="/index.html#clients" data-i18n="[text]header-nav-clients">Кому подходит</a>
                </li>
                <li class="header__nav-item">
                    <a class="header__nav-link" href="/index.html#benefits" data-i18n="[text]header-nav-benefits">Преимущества</a>
                </li>
                <li class="header__nav-item">
                    <a class="header__nav-link" href="/index.html#cta" data-i18n="[text]header-nav-cta">Заявка</a>
                </li>
            </ul>
        </nav>
        <div class="header__controls">
            <a class="button button--primary button--small header__cta" href="/index.html#cta" data-i18n="[text]header-cta">Связаться</a>
            <div class="header__lang" aria-label="Переключение языка" data-i18n="[aria-label]header-lang-aria">
                <button type="button" class="header__lang-button" data-set-lang="ru">RU</button>
                <button type="button" class="header__lang-button" data-set-lang="en">EN</button>
            </div>
            <button
                type="button"
                class="header__menu-toggle"
                aria-label="Открыть или закрыть меню"
                aria-expanded="false"
                aria-controls="mobile-navigation"
                data-i18n="[aria-label]header-menu-toggle-aria"
            >
                <span class="header__menu-icon" aria-hidden="true"></span>
            </button>
        </div>
    </div>

    <div class="header__menu-backdrop" aria-hidden="true"></div>
    <nav class="header__menu-drawer" id="mobile-navigation" aria-label="Основная навигация" data-i18n="[aria-label]header-nav-aria">
        <ul class="mobile-menu__list">
            <li class="mobile-menu__item">
                <a class="mobile-menu__link" href="/index.html#marketplaces" data-i18n="[text]header-nav-marketplaces">Площадки</a>
            </li>
            <li class="mobile-menu__item">
                <a class="mobile-menu__link" href="/index.html#services" data-i18n="[text]header-nav-services-page">Услуги</a>
            </li>
            <li class="mobile-menu__item">
                <a class="mobile-menu__link" href="/index.html#process" data-i18n="[text]header-nav-process">Запуск</a>
            </li>
            <li class="mobile-menu__item">
                <a class="mobile-menu__link" href="/index.html#clients" data-i18n="[text]header-nav-clients">Кому подходит</a>
            </li>
            <li class="mobile-menu__item">
                <a class="mobile-menu__link" href="/index.html#benefits" data-i18n="[text]header-nav-benefits">Преимущества</a>
            </li>
            <li class="mobile-menu__item">
                <a class="mobile-menu__link" href="/index.html#cta" data-i18n="[text]header-nav-cta">Заявка</a>
            </li>
        </ul>
        <a class="button button--primary button--full mobile-menu__cta" href="/index.html#cta" data-i18n="[text]header-cta">Связаться</a>
    </nav>
</header>
